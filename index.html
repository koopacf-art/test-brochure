<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Corporativo</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .controls {
            margin-bottom: 20px;
            z-index: 100;
        }

        button {
            padding: 12px 24px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin: 0 5px;
        }

        /* Contenedor fijo para que no se vea como en tu foto */
        #flipbook {
            width: 800px;
            height: 600px;
            visibility: hidden; /* Se oculta hasta que Turn.js esté listo */
        }

        .page {
            width: 400px;
            height: 600px;
            background: white;
        }

        .page img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain; /* Para que la imagen no se corte */
            background: white;
        }

        #page-label {
            color: #bdc3c7;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="prevBtn">Anterior</button>
        <button id="nextBtn">Siguiente</button>
    </div>

    <div id="flipbook">
        <div class="page"><img src="PORTADA.png"></div>
        <div class="page"><img src="SERVICIOS.png"></div>
        <div class="page"><img src="NUESTRA EMPRESA.png"></div>
        <div class="page"><img src="MISION Y VISION.png"></div>
        <div class="page"><img src="COMPROMISO CORPORATIVO.png"></div>
        <div class="page"><img src="AREA NEGOCIO - PROYECTOS ELECTRICOS.png"></div>
        <div class="page"><img src="AREA NEGOCIO - PLANOS ELECTRICOS.png"></div>
        <div class="page"><img src="AREA NEGOCIO - MANTEMINIMIENTO ELECTRICO.png"></div>
        <div class="page"><img src="AREA NEGOCIO ASESORIAS TECNICAS.png"></div>
        <div class="page"><img src="AREA DE NEGOCIO - ESTUDIOS Y MEDICIONES.png"></div>
        <div class="page"><img src="GALERIA.png"></div>
        <div class="page"><img src="CONTACTO.png"></div>
    </div>

    <div id="page-label">Cargando libro...</div>

<script>
    $(window).on('load', function() {
        var flipbook = $("#flipbook");

        // Hacer visible y ejecutar turn.js
        flipbook.css('visibility', 'visible');
        
        flipbook.turn({
            width: 800,
            height: 600,
            autoCenter: true,
            acceleration: true,
            gradients: true,
            elevation: 50,
            when: {
                turned: function(e, page) {
                    $("#page-label").text("Página " + page);
                }
            }
        });

        // Eventos de botones (Corregidos)
        $("#prevBtn").on("click", function(e) {
            e.preventDefault();
            flipbook.turn("previous");
        });

        $("#nextBtn").on("click", function(e) {
            e.preventDefault();
            flipbook.turn("next");
        });
    });
</script>

</body>
</html>
