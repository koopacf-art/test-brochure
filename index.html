<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo Corporativo</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://rawcdn.githack.com/blasten/turn.js/master/lib/turn.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            color: white;
        }

        .controls { margin: 20px 0; }
        
        button {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Contenedor con tamaño real del libro */
        #flipbook-container {
            width: 800px;
            height: 600px;
            position: relative;
        }

        #flipbook {
            width: 800px;
            height: 600px;
            display: none; /* Se oculta hasta que Turn.js lo active */
        }

        .page {
            width: 400px;
            height: 600px;
            background: white;
        }

        .page img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain; /* Evita que la imagen se estire */
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="prevBtn">Anterior</button>
        <button id="nextBtn">Siguiente</button>
    </div>

    <div id="flipbook-container">
        <div id="loading">Iniciando Flipbook...</div>
        
        <div id="flipbook">
            <div class="page"><img src="PORTADA.png"></div>
            <div class="page"><img src="SERVICIOS.png"></div>
            <div class="page"><img src="NUESTRA EMPRESA.png"></div>
            <div class="page"><img src="MISION Y VISION.png"></div>
            <div class="page"><img src="COMPROMISO CORPORATIVO.png"></div>
            <div class="page"><img src="AREA NEGOCIO - PROYECTOS ELECTRICOS.png"></div>
            <div class="page"><img src="AREA NEGOCIO - PLANOS ELECTRICOS.png"></div>
            <div class="page"><img src="AREA NEGOCIO - MANTEMINIMIENTO ELECTRICO.png"></div>
            <div class="page"><img src="AREA NEGOCIO ASESORIAS TECNICAS.png"></div>
            <div class="page"><img src="AREA DE NEGOCIO - ESTUDIOS Y MEDICIONES.png"></div>
            <div class="page"><img src="GALERIA.png"></div>
            <div class="page"><img src="CONTACTO.png"></div>
        </div>
    </div>

    <script>
        $(window).on('load', function() {
            // Verificamos si Turn.js cargó correctamente
            if ($.isFunction($('#flipbook').turn)) {
                $('#loading').hide();
                $('#flipbook').show().turn({
                    width: 800,
                    height: 600,
                    autoCenter: true,
                    acceleration: true,
                    gradients: true,
                    elevation: 50
                });
            } else {
                $('#loading').text("Error: No se pudo cargar la librería de movimiento.");
            }

            $("#prevBtn").click(function() { $('#flipbook').turn("previous"); });
            $("#nextBtn").click(function() { $('#flipbook').turn("next"); });
        });
    </script>
</body>
</html>
