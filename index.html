<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brochure Corporativo</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js@master/lib/turn.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1e1e1e; /* Fondo oscuro profesional */
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .controls {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        button {
            padding: 12px 25px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        button:hover {
            background: #005fa3;
            transform: translateY(-2px);
        }

        /* Contenedor del Libro */
        #canvas {
            width: 900px;
            height: 600px;
            position: relative;
        }

        #flipbook {
            display: none; /* Se muestra al cargar */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .page {
            background: white;
            width: 450px;
            height: 600px;
        }

        .page img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: fill; /* Importante para que ocupe toda la página como un libro real */
        }

        #loading-status {
            color: #aaa;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="prevBtn">← Anterior</button>
        <button id="nextBtn">Siguiente →</button>
    </div>

    <div id="canvas">
        <div id="flipbook">
            <div class="page"><img src="PORTADA.png"></div>
            <div class="page"><img src="SERVICIOS.png"></div>
            <div class="page"><img src="NUESTRA EMPRESA.png"></div>
            <div class="page"><img src="MISION Y VISION.png"></div>
            <div class="page"><img src="COMPROMISO CORPORATIVO.png"></div>
            <div class="page"><img src="AREA NEGOCIO - PROYECTOS ELECTRICOS.png"></div>
            <div class="page"><img src="AREA NEGOCIO - PLANOS ELECTRICOS.png"></div>
            <div class="page"><img src="AREA NEGOCIO - MANTEMINIMIENTO ELECTRICO.png"></div>
            <div class="page"><img src="AREA NEGOCIO ASESORIAS TECNICAS.png"></div>
            <div class="page"><img src="AREA DE NEGOCIO - ESTUDIOS Y MEDICIONES.png"></div>
            <div class="page"><img src="GALERIA.png"></div>
            <div class="page"><img src="CONTACTO.png"></div>
        </div>
    </div>

    <div id="loading-status">Cargando Brochure...</div>

<script type="text/javascript">
    $(window).on('load', function() {
        const book = $("#flipbook");

        // Intentar inicializar con manejo de errores
        try {
            book.show().turn({
                width: 900,
                height: 600,
                autoCenter: true,
                duration: 1000,
                acceleration: true,
                gradients: true,
                elevation: 50
            });
            $("#loading-status").text("Usa las flechas para navegar");
        } catch (e) {
            $("#loading-status").html("<span style='color:red'>Error al cargar el efecto. Intenta actualizar la página.</span>");
            console.error(e);
        }

        // Navegación
        $("#prevBtn").click(function() { book.turn("previous"); });
        $("#nextBtn").click(function() { book.turn("next"); });

        $(window).bind('keydown', function(e){
            if (e.keyCode == 37) book.turn('previous');
            else if (e.keyCode == 39) book.turn('next');
        });
    });
</script>

</body>
</html>
