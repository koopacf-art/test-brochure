<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook Corporativo</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #2c3e50; /* Color oscuro para resaltar el libro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .flipbook-viewport {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .flipbook {
            width: 800px;
            height: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .page {
            width: 400px;
            height: 600px;
            background: white;
            overflow: hidden;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Cambia a 'contain' si no quieres que se recorten */
        }

        /* Controles */
        .controls {
            margin: 20px 0;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        button:hover { background: #2980b9; }

        .page-num {
            color: white;
            margin-top: 10px;
        }

        /* Ajuste para móviles */
        @media (max-width: 850px) {
            .flipbook { width: 100% !important; height: auto !important; }
            .page { width: 100% !important; }
        }
    </style>
</head>
<body>

<div class="flipbook-viewport">
    <div class="controls">
        <button id="prevBtn">Anterior</button>
        <button id="nextBtn">Siguiente</button>
    </div>

    <div id="flipbook" class="flipbook">
        <div class="page"><img src="PORTADA.png" alt="Portada"></div>
        <div class="page"><img src="SERVICIOS.png" alt="Servicios"></div>
        <div class="page"><img src="NUESTRA EMPRESA.png" alt="Empresa"></div>
        <div class="page"><img src="MISION Y VISION.png" alt="Misión"></div>
        <div class="page"><img src="COMPROMISO CORPORATIVO.png" alt="Compromiso"></div>
        <div class="page"><img src="AREA NEGOCIO - PROYECTOS ELECTRICOS.png" alt="Proyectos"></div>
        <div class="page"><img src="AREA NEGOCIO - PLANOS ELECTRICOS.png" alt="Planos"></div>
        <div class="page"><img src="AREA NEGOCIO - MANTEMINIMIENTO ELECTRICO.png" alt="Mantenimiento"></div>
        <div class="page"><img src="AREA NEGOCIO ASESORIAS TECNICAS.png" alt="Asesorías"></div>
        <div class="page"><img src="AREA DE NEGOCIO - ESTUDIOS Y MEDICIONES.png" alt="Estudios"></div>
        <div class="page"><img src="GALERIA.png" alt="Galería"></div>
        <div class="page"><img src="CONTACTO.png" alt="Contacto"></div>
    </div>

    <div class="page-num" id="page-label">Página 1</div>
</div>

<script>
    $(window).on('load', function() {
        const book = $("#flipbook");

        // Inicialización
        book.turn({
            width: 800,
            height: 600,
            autoCenter: true,
            duration: 1000,
            gradients: true,
            acceleration: true,
            when: {
                turned: function(e, page) {
                    $("#page-label").text("Página " + page);
                }
            }
        });

        // Botones
        $("#prevBtn").click(function() {
            book.turn("previous");
        });

        $("#nextBtn").click(function() {
            book.turn("next");
        });

        // Flechas teclado
        $(window).bind('keydown', function(e){
            if (e.keyCode == 37) book.turn('previous');
            else if (e.keyCode == 39) book.turn('next');
        });
    });
</script>

</body>
</html>
