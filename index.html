<!DOCTYPE html>
<html>
<head>
    <title>Flipbook</title>
    <style>
        button {
    padding: 8px 16px;
    margin: 5px;
    font-size: 14px;
    cursor: pointer;
    background: #007acc;
    color: white;
    border: none;
    border-radius: 4px;
}

button:hover {
    background: #005fa3;
}
        
        .flipbook {
          .flipbook {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    gap: 10px;
    padding: 10px;
    scroll-behavior: smooth; /* <-- Esto hace el scroll más suave */
}
        }
        .page {
            scroll-snap-align: start;
            width: 100%;
            max-width: 600px;
        }
        .page img {
            width: 100%;
            height: auto;
            border: 1px solid #ccc;
        }
        /* Adaptación para móvil */
@media (max-width: 768px) {
    .flipbook {
        gap: 5px;
        padding: 5px;
    }

    .page {
        max-width: 100%;
        width: 100%;
    }

    .page img {
        max-width: 100%;
        height: auto;
    }

    button {
        padding: 6px 12px;
        font-size: 12px;
        margin: 3px;
    }
}
    </style>
</head>
<body>
    <button id="prev">← Anterior</button>
<button id="next">Siguiente →</button>
    <div class="flipbook">
        <div class="page"><img src="img/PORTADA.png" alt="PORTADA"></div>
        <div class="page"><img src="img/SERVICIOS.png" alt="SERVICIOS"></div>
        <div class="page"><img src="img/NUESTRA EMPRESA.png" alt="NUESTRA EMPRESA"> </div>
        <div class="page"><img src="img/MISION Y VISION.png" alt="MISION Y VISION"></div>
        <div class="page"><img src="img/COMPROMISO CORPORATIVO.png" alt="COMPROMISO CORPORATIVO"></div>
        <div class="page"><img src="img/AREA NEGOCIO - PROYECTOS ELECTRICOS.png" alt="ASESORIAS TECNICAS"></div>
        <div class="page"><img src="img/AREA NEGOCIO - PLANOS ELECTRICOS.png" alt="PROYECTOS ELECTRICOS"></div>
        <div class="page"><img src="img/AREA NEGOCIO - MANTEMINIMIENTO ELECTRICO.png" alt="PLANOS ELECTRICOS"></div>
        <div class="page"><img src="img/AREA NEGOCIO ASESORIAS TECNICAS.png" alt="MANTEMINIMIENTO ELECTRICO"></div>
        <div class="page"><img src="img/AREA DE NEGOCIO - ESTUDIOS Y MEDICIONES.png" alt="ESTUDIOS Y MEDICIONES"></div>
        <div class="page"><img src="img/GALERIA.png" alt="GALERIA "></div>
        <div class="page"><img src="img/CONTACTO.png" alt="CONTACTO"></div>

        
      
        <!-- Añade más páginas aquí -->
    </div>
    <script>
    // Detectar gestos táctiles en móvil
    let startX = 0;

    flipbook.addEventListener('touchstart', (e) => {
        startX = e.touches.clientX;
    });

    flipbook.addEventListener('touchend', (e) => {
        const endX = e.changedTouches.clientX;
        const diff = startX - endX;

        if (diff > 50) {
            // Deslizar a la derecha → siguiente página
            if (currentIndex < pages.length - 1) {
                currentIndex++;
                flipbook.scrollTo({ left: pages[currentIndex].offsetLeft, behavior: 'smooth' });
            }
        } else if (diff < -50) {
            // Deslizar a la izquierda → página anterior
            if (currentIndex > 0) {
                currentIndex--;
                flipbook.scrollTo({ left: pages[currentIndex].offsetLeft, behavior: 'smooth' });
            }
        }
    });
</script>
</body>
</html>
